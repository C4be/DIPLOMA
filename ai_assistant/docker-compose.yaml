services:

  # =========================================================
  # Postgres DB and init
  # =========================================================
  postgres:
    image: postgres:18
    container_name: postgres-demo
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/postgres_data:/var/lib/postgresql/data
      - ./postgres/dumps:/dumps
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d demo"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aviation_network
    shm_size: 1gb

volumes:
  postgres_data:

networks:
  aviation_network:
    driver: bridge